name: Deploy static content to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp build metadata
        shell: bash
        run: |
          BUILD_TIMESTAMP="$(TZ=Asia/Nicosia date +'%d%m%Y_%H%M')"
          COMMIT_HASH="${GITHUB_SHA::7}"
          python - "$BUILD_TIMESTAMP" "$COMMIT_HASH" <<'PY'
          from pathlib import Path
          import re
          import sys

          path = Path('src/config/version.js')
          text = path.read_text(encoding='utf-8')
          text, timestamp_count = re.subn(
              r"export const BUILD_TIMESTAMP = '[^']*';",
              f"export const BUILD_TIMESTAMP = '{sys.argv[1]}';",
              text,
              count=1,
          )
          text, commit_count = re.subn(
              r"export const COMMIT_HASH = '[^']*';",
              f"export const COMMIT_HASH = '{sys.argv[2]}';",
              text,
              count=1,
          )
          if timestamp_count != 1 or commit_count != 1:
              raise SystemExit('Unable to stamp build metadata in src/config/version.js')
          path.write_text(text, encoding='utf-8')
          PY

      - name: Include release status styles
        shell: bash
        run: cat src/styles/release-status.css >> src/styles/app.css

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
