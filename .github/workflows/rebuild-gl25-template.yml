name: Rebuild clean GL25 template

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/rebuild-gl25-template.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild-template:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Reconstruct clean template image
        shell: bash
        run: |
          cat assets/gl25-template-parts/part-1.b64 \
              assets/gl25-template-parts/part-2.b64 \
              assets/gl25-template-parts/part-3.b64 \
              assets/gl25-template-parts/part-4.b64 > /tmp/gl25-template.b64
          rev assets/gl25-template-parts/part-5.rev >> /tmp/gl25-template.b64
          rev assets/gl25-template-parts/part-6.rev >> /tmp/gl25-template.b64
          rev assets/gl25-template-parts/part-7.rev >> /tmp/gl25-template.b64
          base64 --decode /tmp/gl25-template.b64 > assets/gl25-template.png

      - name: Commit generated template
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/gl25-template.png
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'Replace background with clean official GL25 template'
          git push
